name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: نصب پیش‌نیازها (ffmpeg, nodejs, yt-dlp)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          # nodejs کمک می‌کند هشدار JS runtime برطرف شود (اختیاری ولی مفید)
          sudo apt-get install -y nodejs
          pip install yt-dlp

      - name: تولید فایل cookies.txt از Secret
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt

      - name: دانلود ویدیو (MP4)
        run: |
          yt-dlp --cookies cookies.txt \
                 --merge-output-format mp4 \
                 "${{ github.event.inputs.url }}"

      - name: آپلود ویدیو به عنوان Artifact
        uses: actions/upload-artifact@v4
        with:
          name: دانلود-شده
          path: "*.mp4"
          if-no-files-found: error
