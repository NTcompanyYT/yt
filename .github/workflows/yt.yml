name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: نصب پیش‌نیازها (ffmpeg, Node.js)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          # نصب Node.js (محیط اجرای جاوااسکریپت ضروری)
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs

      - name: نصب yt-dlp و بسته‌ی حل‌کننده چالش
        run: |
          pip install -U yt-dlp
          # نصب بسته‌ی yt-dlp-ejs (حل‌کننده چالش)
          pip install -U yt-dlp-ejs

      - name: تولید فایل cookies.txt از Secret
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt

      - name: دانلود ویدیو (با تنظیم دستی EJS)
        run: |
          yt-dlp --cookies cookies.txt \
                 --remote-components ejs:github \
                 --js-runtimes node \
                 --merge-output-format mp4 \
                 "${{ github.event.inputs.url }}"

      - name: آپلود ویدیو به عنوان Artifact
        uses: actions/upload-artifact@v4
        with:
          name: دانلود-شده
          path: "*.mp4"
          if-no-files-found: error
