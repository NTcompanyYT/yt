name: YouTube Downloader Debug

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🎬 لینک ویدیو'
        required: true
        type: string
      quality:
        description: '📺 کیفیت'
        required: true
        type: string
        default: '480'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 🔧 نصب yt-dlp و ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: 🍪 تولید cookies.txt
        env:
          COOKIE_B64: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          python3 -c "
          import base64, os
          b64 = os.environ['COOKIE_B64']
          with open('cookies.txt', 'w') as f:
              f.write(base64.b64decode(b64).decode())
          "
          echo "--- cookies.txt (first 5 lines) ---"
          head -n 5 cookies.txt
          echo "--- end ---"

      - name: 🎬 دانلود ویدیو با لاگ کامل
        run: |
          yt-dlp --cookies cookies.txt \
                 -f "bestvideo[height<=${{ inputs.quality }}]+bestaudio/best[height<=${{ inputs.quality }}]" \
                 -o "%(title)s.%(ext)s" \
                 --merge-output-format mp4 \
                 --verbose \
                 "${{ inputs.url }}"
