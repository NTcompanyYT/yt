name: YouTube Downloader Pro (Auto-Cookies)

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🎬 لینک ویدیو یوتیوب'
        required: true
        type: string
      quality:
        description: '📺 کیفیت (480, 720, 1080, best, worst و...)'
        required: true
        type: string
        default: '480'
      save_artifact:
        description: '📦 ذخیره در Artifact'
        type: boolean
        default: true
      save_repo:
        description: '📁 ذخیره در پوشه downloads/ ریپازیتوری'
        type: boolean
        default: false
      save_release:
        description: '🚀 انتشار به‌عنوان Release'
        type: boolean
        default: false

jobs:
  download:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright/python:v1.41.0-focal   # شامل Python + Playwright + Firefox
    steps:
      - name: 📥 دریافت کد ریپازیتوری (برای commit و اسکریپت لاگین)
        uses: actions/checkout@v4

      - name: 🔧 نصب ابزارهای اضافی
        run: |
          apt-get update && apt-get install -y ffmpeg
          pip install yt-dlp yt-dlp-ejs

      - name: 🍪 استخراج خودکار کوکی با Playwright
        env:
          YT_USERNAME: ${{ secrets.YOUTUBE_USERNAME }}
          YT_PASSWORD: ${{ secrets.YOUTUBE_PASSWORD }}
        run: python get_cookies.py

      - name: ⚙️ تنظیم فرمت بر اساس کیفیت
        id: set_format
        run: |
          QUAL="${{ inputs.quality }}"
          if [[ "$QUAL" =~ ^[0-9]+$ ]]; then
            FORMAT="bestvideo[height<=${QUAL}]+bestaudio/best[height<=${QUAL}]"
          else
            FORMAT="$QUAL"
          fi
          echo "FORMAT=$FORMAT" >> $GITHUB_ENV

      - name: 🎬 دانلود ویدیو
        run: |
          yt-dlp --cookies cookies.txt \
                 --js-runtimes node \
                 -f "$FORMAT" \
                 -o "%(title)s.%(ext)s" \
                 --merge-output-format mp4 \
                 "${{ inputs.url }}"

      - name: 📦 آپلود به Artifact
        if: inputs.save_artifact
        uses: actions/upload-artifact@v4
        with:
          name: دانلود-شده
          path: "*.mp4"

      - name: 📁 Commit به پوشه downloads
        if: inputs.save_repo
        run: |
          mkdir -p downloads
          cp *.mp4 downloads/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/*.mp4
          git commit -m "Add video: $(ls *.mp4)" || echo "No changes"
          git push

      - name: 🚀 انتشار Release
        if: inputs.save_release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "*.mp4"
          tag: "vid-${{ github.run_id }}"
          token: ${{ secrets.GITHUB_TOKEN }}
